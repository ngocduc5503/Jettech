<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jettech Mail Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white">

<div class="max-w-7xl mx-auto p-6">

  <!-- HEADER -->
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-cyan-400">📧 Jettech Mail Tool</h1>
    <p class="text-slate-400">Upload • Analyze • Filter Emails</p>
  </div>

  <!-- UPLOAD -->
  <div class="bg-slate-800 p-6 rounded-xl mb-6 shadow-lg">
    <input type="file" id="fileInput" class="mb-4">

    <div class="flex gap-4">
      <button onclick="uploadFile()" 
        class="bg-green-500 hover:bg-green-600 px-5 py-2 rounded-lg font-semibold">
        Upload
      </button>

      <button onclick="checkDuplicate()" 
        class="bg-yellow-500 hover:bg-yellow-600 px-5 py-2 rounded-lg font-semibold">
        Check Duplicate
      </button>
    </div>
  </div>

  <!-- RESULT GRID -->
  <div class="grid md:grid-cols-4 gap-6 mb-8">

    <!-- STATS -->
    <div class="bg-slate-800 p-4 rounded-xl">
      <h3 class="text-green-400 mb-2 font-semibold">Stats</h3>
      <textarea id="uploadResult"
        class="w-full h-40 bg-black p-3 rounded text-green-300 text-sm"></textarea>
    </div>

    <!-- NEW -->
    <div class="bg-slate-800 p-4 rounded-xl">
      <div class="flex justify-between items-center mb-2">
        <h3 class="text-green-300 font-semibold">New Mails</h3>
        <button onclick="copy('newResult')" class="text-xs bg-slate-600 px-2 py-1 rounded">Copy</button>
      </div>
      <textarea id="newResult"
        class="w-full h-40 bg-black p-3 rounded text-green-400 text-sm"></textarea>
    </div>

    <!-- DUPLICATE -->
    <div class="bg-slate-800 p-4 rounded-xl">
      <div class="flex justify-between items-center mb-2">
        <h3 class="text-yellow-400 font-semibold">Duplicates</h3>
        <button onclick="copy('duplicateResult')" class="text-xs bg-slate-600 px-2 py-1 rounded">Copy</button>
      </div>
      <textarea id="duplicateResult"
        class="w-full h-40 bg-black p-3 rounded text-yellow-300 text-sm"></textarea>
    </div>

    <!-- FILTER -->
    <div class="bg-slate-800 p-4 rounded-xl">
      <div class="flex justify-between items-center mb-2">
        <h3 class="text-blue-400 font-semibold">Filter</h3>
        <button onclick="copy('filterResult')" class="text-xs bg-slate-600 px-2 py-1 rounded">Copy</button>
      </div>
      <textarea id="filterResult"
        class="w-full h-40 bg-black p-3 rounded text-blue-300 text-sm"></textarea>
    </div>

  </div>

  <!-- FILTER CONTROLS -->
  <div class="grid md:grid-cols-2 gap-6">

    <!-- DOMAIN -->
    <div class="bg-slate-800 p-5 rounded-xl">
      <input id="domainInput"
        placeholder="gmail.com,yahoo.com"
        class="w-full p-3 bg-slate-700 rounded mb-3">

      <button onclick="filterDomain()"
        class="w-full bg-blue-500 hover:bg-blue-600 py-2 rounded-lg font-semibold">
        Filter Domain
      </button>
    </div>

    <!-- TYPE -->
    <div class="bg-slate-800 p-5 rounded-xl">
      <select id="typeSelect"
        class="w-full p-3 bg-slate-700 rounded mb-3">
        <option value="microsoft">Microsoft</option>
        <option value="mix">Mix</option>
      </select>

      <button onclick="filterType()"
        class="w-full bg-purple-500 hover:bg-purple-600 py-2 rounded-lg font-semibold">
        Filter Type
      </button>
    </div>

  </div>

</div>

<script>
function copy(id){
  const el = document.getElementById(id);
  el.select();
  document.execCommand("copy");
}

async function uploadFile(){
  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Chọn file");

  const form = new FormData();
  form.append("file", file);

  const res = await fetch("/upload-file",{method:"POST",body:form});
  const data = await res.json();

  document.getElementById("uploadResult").value =
    `Total: ${data.total}\nInserted: ${data.inserted}\nDuplicate: ${data.duplicate}`;

  document.getElementById("newResult").value =
    data.newMails.join("\n");

  document.getElementById("duplicateResult").value =
    data.duplicates.join("\n");
}

async function checkDuplicate(){
  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Chọn file");

  const form = new FormData();
  form.append("file", file);

  const res = await fetch("/check-duplicate",{method:"POST",body:form});
  const data = await res.json();

  document.getElementById("uploadResult").value =
    `Total: ${data.total}\nNew: ${data.new}\nDuplicate: ${data.duplicate}`;

  document.getElementById("newResult").value =
    data.newMails.join("\n");  

  document.getElementById("duplicateResult").value =
    data.duplicates.join("\n");
}

async function filterDomain(){
  const val = document.getElementById("domainInput").value;
  const res = await fetch(`/filter?domains=${val}`);
  const data = await res.json();

  document.getElementById("filterResult").value = data.join("\n");
}

async function filterType(){
  const val = document.getElementById("typeSelect").value;
  const res = await fetch(`/filter-type?type=${val}`);
  const data = await res.json();

  document.getElementById("filterResult").value = data.join("\n");
}
</script>

</body>
</html>
