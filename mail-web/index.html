<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jettech Mail Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white p-6">

<div class="max-w-6xl mx-auto">

  <h1 class="text-3xl font-bold text-cyan-400 mb-6">📧 Jettech Mail Tool</h1>

  <!-- UPLOAD -->
  <div class="bg-slate-800 p-6 rounded-xl mb-6">
    <input type="file" id="fileInput" class="mb-4">
    <div class="flex gap-3">
      <button onclick="uploadFile()" class="bg-green-500 px-4 py-2 rounded">Upload</button>
      <button onclick="checkDuplicate()" class="bg-yellow-500 px-4 py-2 rounded">Check Duplicate</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="grid md:grid-cols-3 gap-4">

    <div>
      <h3 class="text-green-400">Upload Stats</h3>
      <textarea id="uploadResult" class="w-full h-40 bg-black p-2 mt-2"></textarea>
    </div>

    <div>
      <h3 class="text-yellow-400">Duplicates</h3>
      <textarea id="duplicateResult" class="w-full h-40 bg-black p-2 mt-2"></textarea>
      <button onclick="copy('duplicateResult')" class="mt-2 bg-slate-600 px-2 py-1">Copy</button>
    </div>

    <div>
      <h3 class="text-blue-400">Filter Result</h3>
      <textarea id="filterResult" class="w-full h-40 bg-black p-2 mt-2"></textarea>
      <button onclick="copy('filterResult')" class="mt-2 bg-slate-600 px-2 py-1">Copy</button>
    </div>

  </div>

  <!-- FILTER -->
  <div class="grid md:grid-cols-2 gap-4 mt-6">

    <div>
      <input id="domainInput" placeholder="gmail.com,yahoo.com"
        class="w-full p-2 bg-slate-700 mb-2">
      <button onclick="filterDomain()" class="bg-blue-500 px-4 py-2 w-full">Filter Domain</button>
    </div>

    <div>
      <select id="typeSelect" class="w-full p-2 bg-slate-700 mb-2">
        <option value="microsoft">Microsoft</option>
        <option value="mix">Mix</option>
      </select>
      <button onclick="filterType()" class="bg-purple-500 px-4 py-2 w-full">Filter Type</button>
    </div>

  </div>

</div>

<script>
const API = "";

function copy(id){
  const el = document.getElementById(id);
  el.select();
  document.execCommand("copy");
  alert("Copied!");
}

async function uploadFile(){
  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Chọn file");

  const form = new FormData();
  form.append("file", file);

  const res = await fetch("/upload-file",{method:"POST",body:form});
  const data = await res.json();

  document.getElementById("uploadResult").value =
    `Total: ${data.total}\nInserted: ${data.inserted}\nDuplicate: ${data.duplicate}`;
}

async function checkDuplicate(){
  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Chọn file");

  const form = new FormData();
  form.append("file", file);

  const res = await fetch("/check-duplicate",{method:"POST",body:form});
  const data = await res.json();

  document.getElementById("duplicateResult").value =
    data.duplicates.join("\n");
}

async function filterDomain(){
  const val = document.getElementById("domainInput").value;
  const res = await fetch(`/filter?domains=${val}`);
  const data = await res.json();

  document.getElementById("filterResult").value = data.join("\n");
}

async function filterType(){
  const val = document.getElementById("typeSelect").value;
  const res = await fetch(`/filter-type?type=${val}`);
  const data = await res.json();

  document.getElementById("filterResult").value = data.join("\n");
}
</script>

</body>
</html>
